name: Linting Pipeline
on:
  push:
    branches: [ "**" ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install flake8
      - run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
